<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Financeiro Completo</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:Arial;background:#0f172a;color:#fff;padding:15px}
h1{text-align:center}
.card{background:#1e293b;padding:15px;border-radius:10px;margin-bottom:10px}
input{width:100%;padding:8px;margin-top:5px;border-radius:6px;border:none}
button{margin-top:8px;padding:10px;width:100%;border:none;border-radius:8px;background:#22c55e;color:#000;font-weight:bold}
.alert{padding:10px;margin-top:10px;border-radius:8px;display:none}
</style>
</head>
<body>

<h1>📱 App Financeiro</h1>

<div class="card">
<h3>💰 Receita Mensal</h3>
<input id="receita" type="number" value="8000">
</div>

<div class="card">
<h3>🏠 Custos Fixos</h3>
<input id="custos" type="number" value="3500">
</div>

<div class="card">
<h3>⚔️ Dívida Atual</h3>
<input id="divida" type="number" value="40000">
</div>

<div class="card">
<h3>📅 Ganho Diário</h3>
<input id="ganho" type="number" placeholder="Valor do dia">
<button onclick="addGanho()">Adicionar</button>
</div>

<div class="card">
<h3>💸 Distribuição automática</h3>
<p>Dívida: R$ <span id="dividaPago">0</span></p>
<p>Investimento: R$ <span id="invest">0</span></p>
</div>

<div class="card">
<h3>📊 Status</h3>
<p>Total mês: R$ <span id="total">0</span></p>
<p>Meta diária: R$ <span id="meta">0</span></p>
</div>

<div id="alerta" class="alert"></div>

<canvas id="grafico"></canvas>

<script>
let dados = JSON.parse(localStorage.getItem('dados')) || [];

function salvar(){localStorage.setItem('dados', JSON.stringify(dados));}

function metaDia(){
 let receita = Number(document.getElementById('receita').value);
 let meta = receita/26;
 document.getElementById('meta').innerText = meta.toFixed(2);
 return meta;
}

function addGanho(){
 let valor = Number(document.getElementById('ganho').value);
 if(!valor) return;
 dados.push(valor);
 salvar();
 document.getElementById('ganho').value='';
 atualizar();
}

function atualizar(){
 let total = dados.reduce((a,b)=>a+b,0);
 document.getElementById('total').innerText = total.toFixed(2);

 let meta = metaDia();
 let media = dados.length ? total/dados.length : 0;
 let alerta = document.getElementById('alerta');

 if(media < meta){
  alerta.style.display='block';
  alerta.style.background='#ef4444';
  alerta.innerText='⚠️ Abaixo da meta';
 } else {
  alerta.style.display='block';
  alerta.style.background='#22c55e';
  alerta.innerText='✅ Acima da meta';
 }

 // distribuição automática
 let divida = total * 0.7;
 let invest = total * 0.3;
 document.getElementById('dividaPago').innerText = divida.toFixed(2);
 document.getElementById('invest').innerText = invest.toFixed(2);

 grafico();
}

let chart;
function grafico(){
 if(chart) chart.destroy();
 chart = new Chart(document.getElementById('grafico'),{
  type:'line',
  data:{
   labels: dados.map((_,i)=>'Dia '+(i+1)),
   datasets:[{label:'Ganhos',data:dados}]
  }
 });
}

metaDia();
atualizar();
</script>

</body>
</html>
